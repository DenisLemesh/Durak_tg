<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Дурак</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d2218;height:100dvh;overflow:hidden}
#app{height:100dvh;background:radial-gradient(ellipse at 50% 40%,#2d6a4f,#1b4332 60%,#0d2218 100%);position:relative;display:flex;flex-direction:column;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s;padding:16px}
.screen.off{opacity:0;pointer-events:none}
.logo{font-size:52px;font-weight:800;color:#f0b429;letter-spacing:-2px;text-shadow:0 0 30px rgba(240,180,41,.35)}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-top:-14px}
.mbtn{width:210px;padding:14px 0;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .12s}
.mbtn:active{transform:scale(.96)}
.mbtn.gold{background:linear-gradient(135deg,#f0b429,#d47800);color:#1a1a1a;box-shadow:0 6px 20px rgba(240,180,41,.35)}
.mbtn.ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.tg-name{font-size:13px;color:rgba(255,255,255,.5);margin-top:-8px}
.fc{position:absolute;font-size:18px;font-weight:700;opacity:.1;animation:floatUp linear infinite;pointer-events:none}
@keyframes floatUp{from{transform:translateY(105vh) rotate(var(--r))}to{transform:translateY(-10vh) rotate(calc(var(--r)+25deg))}}
#game-screen{padding:0;justify-content:flex-start}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.5);flex-shrink:0;width:100%}
.chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border-radius:50px;padding:4px 10px 4px 4px;border:2px solid transparent;transition:border-color .25s}
.chip.on{border-color:#f0b429;box-shadow:0 0 10px rgba(240,180,41,.35)}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.cn{font-size:11px;color:#fff;font-weight:600;line-height:1.2}
.cr{font-size:10px;color:rgba(255,255,255,.45)}
.bdg{background:#f0b429;color:#1a1a1a;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.trump-box{display:flex;flex-direction:column;align-items:center;gap:1px}
.trump-suit{font-size:22px;animation:tp 2s ease-in-out infinite}
@keyframes tp{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.trump-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px}
.game-body{flex:1;position:relative;overflow:hidden;width:100%}
.deck-zone{position:absolute;right:10px;top:44%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:4px}
.deck-stack{position:relative;width:46px;height:65px}
.dc{position:absolute;width:46px;height:65px;background:linear-gradient(135deg,#1a4a6b,#0d2b42);border-radius:6px;border:1px solid rgba(255,255,255,.12)}
.dc:nth-child(1){transform:translate(-2px,-2px) rotate(-2deg)}
.dc:nth-child(2){transform:translate(-1px,-1px) rotate(-1deg)}
.trump-mini{position:absolute;bottom:-18px;left:-6px;width:46px;height:65px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;transform:rotate(90deg);border:2px solid #f0b429}
.deck-cnt{font-size:10px;color:rgba(255,255,255,.6);font-weight:600}
.table-area{position:absolute;inset:0;bottom:120px;display:flex;align-items:center;justify-content:center;padding-right:70px}
.pairs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;max-width:300px}
.pair{position:relative;width:48px;height:68px}
.card{position:absolute;width:48px;height:68px;background:#fff;border-radius:7px;display:flex;flex-direction:column;justify-content:space-between;padding:3px 4px;font-weight:700;border:1px solid rgba(0,0,0,.1);transition:transform .15s,box-shadow .15s}
.card.atk{top:0;left:0}
.card.def{top:-8px;left:5px;transform:rotate(7deg)}
.card.rc{color:#c0392b}.card.bc{color:#1a1a1a}
.card.tc{background:linear-gradient(135deg,#fffde7,#fff9c4)}
.card .rk{font-size:11px;line-height:1}.card .st{font-size:14px;line-height:1}
.card .rb{font-size:11px;line-height:1;transform:rotate(180deg);align-self:flex-end}
.pair.target .card.atk{box-shadow:0 0 0 2.5px #f0b429,0 4px 12px rgba(240,180,41,.45);cursor:pointer;transform:scale(1.06)}
.fab{position:absolute;right:12px;bottom:128px;z-index:200;padding:11px 20px;border:none;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.6);transition:transform .12s,opacity .2s}
.fab:active{transform:scale(.93)}
.fab.end{background:rgba(10,10,10,.9);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.fab.take{background:#c0392b;color:#fff}
.fab.ok{background:linear-gradient(135deg,#f0b429,#d47800);color:#1a1a1a}
.fab.off{opacity:0;pointer-events:none}
.hand-wrap{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
.hand{position:relative;height:98px;display:flex;align-items:flex-end}
.hcard{position:absolute;width:54px;height:78px;cursor:pointer;transform-origin:bottom center;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.hcard:hover .card,.hcard.sel .card{transform:translateY(-22px)}
.hcard.sel .card{outline:2.5px solid #f0b429}
.hint-bar{padding:3px 12px 5px;background:rgba(0,0,0,.45);flex-shrink:0;text-align:center}
.hint{font-size:10px;color:rgba(255,255,255,.38)}
.status{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#fff;padding:8px 20px;border-radius:50px;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:60;max-width:92%;text-align:center}
.status.show{opacity:1}
#result-screen .box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:28px 36px;text-align:center;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1);opacity:1}}
.res-em{font-size:60px;margin-bottom:10px}
.res-t{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.res-s{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:24px}
</style>
</head>
<body>
<div id="app">

<div id="menu-screen" class="screen">
  <div class="logo">♠ ДУРАК</div>
  <div class="logo-sub">карточная игра</div>
  <div class="tg-name" id="tgName"></div>
  <button class="mbtn gold" id="btnPlay">Играть с ботом</button>
  <button class="mbtn ghost" id="btnRules">Правила</button>
</div>

<div id="game-screen" class="screen off">
  <div class="topbar">
    <div class="chip" id="oppChip">
      <div class="av" id="oppAv">Б</div>
      <div><div class="cn">Бот</div><div class="cr" id="oppRole">атакует</div></div>
      <div class="bdg" id="oppCnt">6</div>
    </div>
    <div class="trump-box">
      <div class="trump-suit" id="trumpSuit">♠</div>
      <div class="trump-lbl">КОЗЫРЬ</div>
    </div>
    <div class="chip" id="myChip">
      <div class="av" id="myAv">Я</div>
      <div><div class="cn" id="myName">Вы</div><div class="cr" id="myRole">атакует</div></div>
      <div class="bdg" id="myCnt">6</div>
    </div>
  </div>
  <div class="game-body">
    <div class="deck-zone">
      <div class="deck-stack">
        <div class="dc"></div><div class="dc"></div>
        <div class="trump-mini" id="trumpMini"></div>
      </div>
      <div class="deck-cnt" id="deckCnt">24</div>
    </div>
    <div class="table-area"><div class="pairs" id="pairs"></div></div>
    <div class="status" id="status"></div>
    <button class="fab off" id="fab"></button>
  </div>
  <div class="hint-bar"><div class="hint" id="hint"></div></div>
  <div class="hand-wrap"><div class="hand" id="hand"></div></div>
</div>

<div id="result-screen" class="screen off">
  <div class="box">
    <div class="res-em" id="resEm">🎉</div>
    <div class="res-t" id="resT">Победа!</div>
    <div class="res-s" id="resS"></div>
    <button class="mbtn gold" id="btnAgain" style="margin:0 auto">Ещё раз</button>
    <button class="mbtn ghost" id="btnMenu3" style="margin:8px auto 0">Меню</button>
  </div>
</div>

</div>
<script>
// ── TELEGRAM MINI APP INIT ────────────────────────────────────
const tg = window.Telegram?.WebApp;
let tgUser = null;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0d2218');
  tg.setBackgroundColor('#0d2218');
  tgUser = tg.initDataUnsafe?.user;
  if (tgUser) {
    document.getElementById('tgName').textContent = '👤 ' + (tgUser.first_name || 'Игрок');
    document.getElementById('myName').textContent = tgUser.first_name || 'Вы';
    const myAv = document.getElementById('myAv');
    if (tgUser.photo_url) {
      myAv.innerHTML = `<img src="${tgUser.photo_url}" alt="">`;
    } else {
      myAv.textContent = (tgUser.first_name || 'Я')[0].toUpperCase();
    }
  }
}
document.addEventListener('touchmove', e => { if (!e.target.closest('.hand')) e.preventDefault(); }, { passive: false });

// ── GAME ─────────────────────────────────────────────────────
const SUITS=['♠','♥','♦','♣'], RANKS=['6','7','8','9','10','В','Д','К','Т'];
const RV={'6':6,'7':7,'8':8,'9':9,'10':10,'В':11,'Д':12,'К':13,'Т':14};
const isRed=s=>s==='♥'||s==='♦';
const $=i=>document.getElementById(i);
let G=null, stTO=null;

function canBeat(atk,def,tr){
  const aT=atk.s===tr, dT=def.s===tr;
  if(dT&&!aT) return true;
  if(dT&&aT)  return RV[def.r]>RV[atk.r];
  if(!dT&&aT) return false;
  if(def.s===atk.s) return RV[def.r]>RV[atk.r];
  return false;
}

function showScreen(id){['menu','game','result'].forEach(s=>$(s+'-screen').classList.toggle('off',s!==id));}
function mkDeck(){const d=[];for(const s of SUITS)for(const r of RANKS)d.push({r,s,id:r+s});return d;}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function startGame(){
  const deck=shuf(mkDeck()), trump=deck[deck.length-1].s;
  G={trump, trumpCard:deck[deck.length-1], deck:deck.slice(12),
     p:{hand:deck.slice(0,6),atk:true}, o:{hand:deck.slice(6,12),atk:false},
     table:[], sel:null, state:'my_attack', over:false};
  showScreen('game');
  renderAll();
  requestAnimationFrame(()=>requestAnimationFrame(()=>dealAnim()));
  setSt('⚔ Ваш ход — атакуйте!');
}

function renderAll(){
  if(!G)return;
  renderTop();renderDeck();renderTable();renderHand();renderFab();
}
function renderTop(){
  $('oppChip').classList.toggle('on',G.o.atk);
  $('myChip').classList.toggle('on',G.p.atk);
  $('oppRole').textContent=G.o.atk?'атакует':'защищается';
  $('myRole').textContent=G.p.atk?'атакует':'защищается';
  $('oppCnt').textContent=G.o.hand.length;
  $('myCnt').textContent=G.p.hand.length;
  $('trumpSuit').textContent=G.trump;
  $('trumpSuit').style.color=isRed(G.trump)?'#e74c3c':'#fff';
}
function renderDeck(){
  $('deckCnt').textContent=G.deck.length;
  $('trumpMini').textContent=G.trumpCard.r+G.trumpCard.s;
  $('trumpMini').style.color=isRed(G.trumpCard.s)?'#c0392b':'#1a1a1a';
  $('trumpMini').style.display=G.deck.length>0?'flex':'none';
}
function renderTable(){
  const c=$('pairs');c.innerHTML='';
  const def=G.state==='my_defense', hasSel=!!G.sel;
  G.table.forEach((pair,idx)=>{
    const pd=document.createElement('div');
    pd.className='pair'+(def&&hasSel&&!pair.def?' target':'');
    pd.appendChild(mkCardEl(pair.atk,'atk'));
    if(pair.def) pd.appendChild(mkCardEl(pair.def,'def'));
    if(def) pd.addEventListener('click',e=>{e.stopPropagation();tryDefend(idx);});
    c.appendChild(pd);
  });
}
function mkCardEl(card,cls){
  const el=document.createElement('div');
  el.className='card '+(cls||'')+' '+(isRed(card.s)?'rc':'bc')+(card.s===G.trump?' tc':'');
  el.innerHTML=`<span class="rk">${card.r}</span><span class="st">${card.s}</span><span class="rb">${card.r}</span>`;
  return el;
}
function renderHand(){
  const c=$('hand');c.innerHTML='';
  const h=G.p.hand;if(!h.length)return;
  const n=h.length,sp=Math.min(290,n*46),step=n>1?sp/(n-1):0,sx=-sp/2,fa=Math.min(4,20/n);
  c.style.width=(sp+58)+'px';
  h.forEach((card,i)=>{
    const x=sx+i*step,ang=(i-(n-1)/2)*fa,yo=Math.abs(i-(n-1)/2)*1.5;
    const bt=`translateX(${x}px) translateY(${yo}px) rotate(${ang}deg)`;
    const w=document.createElement('div');
    w.className='hcard'+(G.sel===card.id?' sel':'');
    w.style.cssText=`left:50%;margin-left:-27px;transform:${bt}`;
    w.dataset.id=card.id;
    w.appendChild(mkCardEl(card,''));
    w.addEventListener('click',e=>{e.stopPropagation();onCardClick(card.id);});
    c.appendChild(w);
  });
}
function renderFab(){
  const btn=$('fab');
  btn.onclick=null; btn.className='fab';
  switch(G.state){
    case 'my_attack':
      if(G.table.length>0){btn.className='fab end';btn.textContent='Завершить ход ✓';btn.onclick=finishTurn;$('hint').textContent='Тапни карту дважды — добавить атаку';}
      else{btn.className='fab off';$('hint').textContent='Выберите карту → тапните ещё раз';}
      break;
    case 'wait_ai_def':
      btn.className='fab end';btn.textContent='Завершить ход ✓';btn.onclick=finishTurn;$('hint').textContent='Бот защищается...';break;
    case 'my_defense':{
      const all=G.table.length>0&&G.table.every(p=>p.def);
      if(all){btn.className='fab ok';btn.textContent='Готово ✓';btn.onclick=confirmDone;$('hint').textContent='Все карты отбиты!';}
      else{btn.className='fab take';btn.textContent='Беру';btn.onclick=takeCards;$('hint').textContent=G.sel?'Тапни атакующую карту на столе':'Выбери карту из руки → тапни на столе';}
      break;}
    case 'wait_ai_add':case 'ai_attack':
      btn.className='fab off';$('hint').textContent=G.state==='ai_attack'?'Соперник атакует...':'Ожидаем бота...';break;
    default:btn.className='fab off';$('hint').textContent='';
  }
}

function onCardClick(id){
  if(!G||G.over)return;
  if(G.state==='my_attack'){
    if(G.sel===id){doAttack(id);}else{G.sel=id;renderHand();renderFab();}
  } else if(G.state==='my_defense'){
    G.sel=id;renderHand();renderTable();renderFab();setSt('Тапни карту соперника на столе');
  }
}

function tryDefend(idx){
  if(G.state!=='my_defense')return;
  const pair=G.table[idx];
  if(pair.def){setSt('Уже отбита');return;}
  if(!G.sel){setSt('Сначала выберите карту из руки');return;}
  const def=G.p.hand.find(c=>c.id===G.sel);
  if(!def){G.sel=null;renderHand();return;}
  const atk=pair.atk;
  if(!canBeat(atk,def,G.trump)){
    const aT=atk.s===G.trump,dT=def.s===G.trump;
    let msg='Карта не бьёт!';
    if(aT&&!dT) msg='Козырь бить только козырем!';
    else if(!dT&&def.s!==atk.s) msg='Разные масти — нужен козырь!';
    else if(def.s===atk.s) msg='Нужна карта старше!';
    else if(dT&&aT) msg='Козырь слабее — нужен старше!';
    setSt(msg);shakeHand();return;
  }
  pair.def=def;
  G.p.hand=G.p.hand.filter(c=>c.id!==G.sel);
  G.sel=null;renderAll();popCard();
  if(G.table.every(p=>p.def)){setSt('✅ Все отбиты!');G.state='wait_ai_add';renderFab();setTimeout(aiAddOrEnd,900);}
}

function doAttack(id){
  const card=G.p.hand.find(c=>c.id===id);if(!card)return;
  if(G.table.length>0){
    const rks=new Set();G.table.forEach(p=>{rks.add(p.atk.r);if(p.def)rks.add(p.def.r);});
    if(!rks.has(card.r)){setSt('Ранг не совпадает');shakeHand();return;}
    if(G.table.length>=6){setSt('Максимум 6 пар');return;}
    if(G.table.length>=G.o.hand.length){setSt('У бота мало карт');return;}
  }
  G.table.push({atk:card,def:null});
  G.p.hand=G.p.hand.filter(c=>c.id!==id);
  G.sel=null;G.state='wait_ai_def';
  renderAll();popCard();setSt('🛡 Бот защищается...');setTimeout(aiDefend,900);
}

function finishTurn(){
  if(!G||G.over||G.table.length===0)return;
  if(G.table.every(p=>p.def)){finishRound(true);}
  else{G.state='wait_ai_def';renderFab();}
}
function takeCards(){
  if(G.state!=='my_defense')return;
  $('pairs').querySelectorAll('.pair').forEach((el,i)=>{setTimeout(()=>{el.style.transition='transform .3s,opacity .3s';el.style.transform='translateY(60px) scale(.75)';el.style.opacity='0';},i*50);});
  setTimeout(()=>{G.table.forEach(p=>{G.p.hand.push(p.atk);if(p.def)G.p.hand.push(p.def);});G.table=[];G.sel=null;finishRound(false);},480);
}
function confirmDone(){
  if(G.state!=='my_defense')return;
  if(!G.table.every(p=>p.def)){setSt('Не все отбиты!');return;}
  finishRound(true);
}
function finishRound(sw){
  G.table=[];G.sel=null;
  const f=G.p.atk?G.p:G.o,s=G.p.atk?G.o:G.p;
  refill(f);refill(s);
  if(sw){G.p.atk=!G.p.atk;G.o.atk=!G.o.atk;}
  if(checkWin())return;
  if(G.p.atk){G.state='my_attack';renderAll();setSt('⚔ Ваш ход!');}
  else{G.state='ai_attack';renderAll();setSt('⏳ Соперник атакует...');setTimeout(aiTurn,1100);}
}
function refill(p){while(p.hand.length<6&&G.deck.length>0)p.hand.push(G.deck.pop());}
function checkWin(){
  const gone=G.deck.length===0,pOut=gone&&G.p.hand.length===0,oOut=gone&&G.o.hand.length===0;
  if(!pOut&&!oOut)return false;
  G.over=true;
  const draw=pOut&&oOut;
  if(tg){tg.HapticFeedback?.notificationOccurred(pOut&&!oOut?'success':'error');}
  setTimeout(()=>{
    $('resEm').textContent=draw?'🤝':pOut?'🎉':'😅';
    $('resT').textContent=draw?'Ничья!':pOut?'Победа!':'Дурак!';
    $('resS').textContent=draw?'Оба вышли одновременно':pOut?'Соперник остался в дураках!':'Бот победил — попробуй ещё!';
    showScreen('result');
  },700);
  return true;
}

function aiTurn(){if(!G||G.p.atk||G.over)return;aiAttackOne();}
function aiAttackOne(){
  if(!G||G.p.atk||G.over)return;
  const h=G.o.hand;if(!h.length){finishRound(true);return;}
  let card=null;
  if(G.table.length===0){const nt=h.filter(c=>c.s!==G.trump).sort((a,b)=>RV[a.r]-RV[b.r]);card=nt[0]||[...h].sort((a,b)=>RV[a.r]-RV[b.r])[0];}
  else{const rks=new Set();G.table.forEach(p=>{rks.add(p.atk.r);if(p.def)rks.add(p.def.r);});const m=h.filter(c=>rks.has(c.r));if(m.length&&G.table.length<6&&G.table.length<G.p.hand.length)card=m.sort((a,b)=>RV[a.r]-RV[b.r])[0];}
  if(!card){finishRound(G.table.length===0||G.table.every(p=>p.def));return;}
  G.table.push({atk:card,def:null});G.o.hand=G.o.hand.filter(c=>c.id!==card.id);
  G.state='my_defense';renderAll();popCard();setSt('⚔ Соперник атакует!');
}
function aiDefend(){
  if(!G||G.over||G.state!=='wait_ai_def')return;
  let took=false;
  for(const pair of G.table){
    if(pair.def)continue;
    const bt=G.o.hand.filter(c=>canBeat(pair.atk,c,G.trump)).sort((a,b)=>{const at=a.s===G.trump,bt2=b.s===G.trump;return at!==bt2?(at?1:-1):RV[a.r]-RV[b.r];});
    if(!bt.length){took=true;break;}
    pair.def=bt[0];G.o.hand=G.o.hand.filter(c=>c.id!==bt[0].id);
  }
  if(took){setSt('🤖 Бот берёт карты...');G.table.forEach(p=>{G.o.hand.push(p.atk);if(p.def)G.o.hand.push(p.def);});G.table=[];finishRound(false);return;}
  G.state='my_attack';renderAll();setSt('✅ Бот отбился — добавьте или завершите');
}
function aiAddOrEnd(){
  if(!G||G.over||G.p.atk)return;
  const rks=new Set();G.table.forEach(p=>{rks.add(p.atk.r);if(p.def)rks.add(p.def.r);});
  const can=G.o.hand.some(c=>rks.has(c.r))&&G.table.length<6&&G.table.length<G.p.hand.length;
  if(can&&Math.random()>.45){aiAttackOne();}else{finishRound(true);}
}

function dealAnim(){document.querySelectorAll('#hand .hcard').forEach((el,i)=>{el.style.opacity='0';setTimeout(()=>{el.style.opacity='1';el.style.transition=`opacity .28s ease ${i*70}ms,transform .35s cubic-bezier(.34,1.56,.64,1) ${i*70}ms`;},30);});}
function popCard(){const last=$('pairs').lastElementChild;if(!last)return;last.style.transform='scale(.45)';last.style.opacity='0';requestAnimationFrame(()=>{last.style.transition='transform .28s cubic-bezier(.34,1.56,.64,1),opacity .22s';last.style.transform='scale(1)';last.style.opacity='1';});}
function shakeHand(){const s=document.querySelector('.hcard.sel');if(!s)return;s.animate([{transform:s.style.transform+' translateX(0)'},{transform:s.style.transform+' translateX(-9px)'},{transform:s.style.transform+' translateX(9px)'},{transform:s.style.transform+' translateX(-5px)'},{transform:s.style.transform+' translateX(0)'}],{duration:300,easing:'ease'});}
function setSt(msg,dur=2600){const el=$('status');el.textContent=msg;el.classList.add('show');clearTimeout(stTO);stTO=setTimeout(()=>el.classList.remove('show'),dur);}

(function(){const syms=['♠','♥','♦','♣'];for(let i=0;i<12;i++){const el=document.createElement('div');el.className='fc';el.textContent=syms[i%4];el.style.cssText=`left:${Math.random()*90}%;--r:${Math.random()*60-30}deg;animation-duration:${9+Math.random()*10}s;animation-delay:${-Math.random()*18}s`;$('menu-screen').appendChild(el);}})();

$('btnPlay').onclick=startGame;
$('btnRules').onclick=()=>alert('♠ Как отбивать:\n\n1. Тапни карту в руке — она поднимется\n2. Тапни карту соперника на столе\n\nМожно отбить:\n• Та же масть, карта старше\n• Козырем — любую не-козырную\n• Козырем козырь — только старшим\n\nНельзя:\n• Не-козырем бить козырь\n• Разной мастью (без козыря)');
$('btnAgain').onclick=startGame;
$('btnMenu3').onclick=()=>showScreen('menu');
</script>
